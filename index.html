<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ArctIQ Ventures</title>

  <link rel="icon" type="image/png" href="favicon.png">

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #020407;
      --fg: #e6edf3;
      --muted: #6b7c93;
      --accent: #00ff88;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 30% 30%, #0a0f18, #020407);
      color: var(--fg);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 0 20px;
    }

    /* YOUR ORIGINAL LOGO STYLE — CLEANED */
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      letter-spacing: 0.35em;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .logo em {
      color: var(--accent);
      font-style: normal;
    }

    .headline {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .headline span {
      color: var(--accent);
    }

    .footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--muted);
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="logo">ARCT<em>IQ</em></div>

    <div class="headline">
      ArctIQ Ventures — <span>technology and investments.</span>
    </div>
  </div>

  <div class="footer">
    ARCT IQ VENTURES (OPC) PVT. LTD.
  </div>

</body>
</html>
